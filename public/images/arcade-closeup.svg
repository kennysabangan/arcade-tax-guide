<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbb155"/>
      <stop offset="100%" stop-color="#c49a3c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="rgba(219,177,85,0.06)" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Arcade cabinet -->
  <g transform="translate(200,60)">
    <!-- Cabinet body -->
    <rect x="0" y="80" width="400" height="460" rx="12" fill="#1a1a2e" stroke="url(#gold)" stroke-width="2"/>
    <!-- Screen bezel -->
    <rect x="30" y="100" width="340" height="220" rx="8" fill="#0a0a0f" stroke="url(#gold)" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="45" y="115" width="310" height="190" rx="4" fill="#0d0d1a"/>
    <!-- Screen content - game demo -->
    <g filter="url(#glow)">
      <text x="200" y="185" text-anchor="middle" fill="#dbb155" font-family="monospace" font-size="24" font-weight="bold">INSERT COIN</text>
      <text x="200" y="225" text-anchor="middle" fill="rgba(219,177,85,0.6)" font-family="monospace" font-size="14">PRESS START</text>
      <rect x="100" y="245" width="200" height="3" rx="1.5" fill="rgba(219,177,85,0.3)"/>
      <rect x="100" y="245" width="140" height="3" rx="1.5" fill="#dbb155"/>
      <text x="200" y="280" text-anchor="middle" fill="rgba(0,255,209,0.5)" font-family="monospace" font-size="11">CREDIT: 00</text>
    </g>
    <!-- Marquee -->
    <rect x="30" y="40" width="340" height="45" rx="4" fill="url(#gold)" opacity="0.9"/>
    <text x="200" y="70" text-anchor="middle" fill="#0a0a0f" font-family="serif" font-size="22" font-weight="bold">ARCADE TAX GUIDE</text>
    <!-- Control panel -->
    <rect x="60" y="340" width="280" height="100" rx="6" fill="#1e1e35" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <!-- Joystick -->
    <circle cx="150" cy="390" r="25" fill="#1a1a2e" stroke="rgba(219,177,85,0.4)" stroke-width="1.5"/>
    <circle cx="150" cy="385" r="8" fill="#dbb155"/>
    <!-- Buttons -->
    <circle cx="260" cy="375" r="18" fill="#1a1a2e" stroke="#dbb155" stroke-width="1.5"/>
    <circle cx="300" cy="395" r="18" fill="#1a1a2e" stroke="rgba(0,255,209,0.6)" stroke-width="1.5"/>
    <circle cx="240" cy="410" r="18" fill="#1a1a2e" stroke="rgba(219,177,85,0.4)" stroke-width="1.5"/>
    <circle cx="260" cy="375" r="6" fill="#dbb155"/>
    <circle cx="300" cy="395" r="6" fill="rgba(0,255,209,0.8)"/>
    <circle cx="240" cy="410" r="6" fill="rgba(219,177,85,0.5)"/>
    <!-- Coin slot -->
    <rect x="180" y="460" width="40" height="8" rx="4" fill="#0a0a0f" stroke="url(#gold)" stroke-width="1"/>
    <text x="200" y="490" text-anchor="middle" fill="rgba(219,177,85,0.5)" font-family="monospace" font-size="9">COIN ACCEPTOR</text>
    <!-- Bill acceptor -->
    <rect x="300" y="455" width="50" height="30" rx="3" fill="#0a0a0f" stroke="rgba(219,177,85,0.4)" stroke-width="1"/>
    <line x1="310" y1="465" x2="340" y2="465" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <line x1="310" y1="470" x2="340" y2="470" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <line x1="310" y1="475" x2="340" y2="475" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <text x="325" y="500" text-anchor="middle" fill="rgba(219,177,85,0.5)" font-family="monospace" font-size="9">BILL</text>
  </g>
  <!-- Ambient glow -->
  <ellipse cx="400" cy="300" rx="300" ry="250" fill="rgba(219,177,85,0.03)"/>
</svg>
