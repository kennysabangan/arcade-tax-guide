<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbb155"/>
      <stop offset="100%" stop-color="#c49a3c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="rgba(219,177,85,0.06)" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <!-- Venue floor -->
  <rect x="0" y="470" width="800" height="130" fill="rgba(219,177,85,0.02)"/>
  <!-- Row of 5 arcade cabinets -->
  <g transform="translate(40,80)">
    <rect x="0" y="40" width="130" height="350" rx="6" fill="#1a1a2e" stroke="rgba(219,177,85,0.3)" stroke-width="1.5"/>
    <rect x="12" y="55" width="106" height="75" rx="3" fill="#0d0d1a" stroke="rgba(219,177,85,0.2)" stroke-width="1"/>
    <text x="65" y="98" text-anchor="middle" fill="#dbb155" font-family="monospace" font-size="9">INSERT COIN</text>
    <rect x="25" y="140" width="80" height="35" rx="3" fill="#1e1e35"/>
    <circle cx="50" cy="158" r="8" fill="#dbb155"/>
    <circle cx="80" cy="155" r="6" fill="rgba(0,255,209,0.6)"/>
  </g>
  <g transform="translate(190,60)">
    <rect x="0" y="40" width="130" height="370" rx="6" fill="#1a1a2e" stroke="rgba(219,177,85,0.3)" stroke-width="1.5"/>
    <rect x="12" y="55" width="106" height="80" rx="3" fill="#0d0d1a" stroke="rgba(219,177,85,0.2)" stroke-width="1"/>
    <text x="65" y="100" text-anchor="middle" fill="rgba(0,255,209,0.7)" font-family="monospace" font-size="9">NOW PLAYING</text>
    <rect x="25" y="145" width="80" height="35" rx="3" fill="#1e1e35"/>
    <circle cx="50" cy="163" r="8" fill="#dbb155"/>
    <circle cx="80" cy="160" r="6" fill="#dbb155"/>
  </g>
  <g transform="translate(340,50)">
    <rect x="0" y="40" width="130" height="380" rx="6" fill="#1a1a2e" stroke="url(#gold)" stroke-width="2"/>
    <rect x="12" y="55" width="106" height="85" rx="3" fill="#0d0d1a" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <text x="65" y="100" text-anchor="middle" fill="#dbb155" font-family="monospace" font-size="10" font-weight="bold">★ FEATURED ★</text>
    <rect x="25" y="150" width="80" height="35" rx="3" fill="#1e1e35" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <circle cx="50" cy="168" r="8" fill="#dbb155"/>
    <circle cx="80" cy="165" r="6" fill="rgba(0,255,209,0.7)"/>
  </g>
  <g transform="translate(490,65)">
    <rect x="0" y="40" width="130" height="365" rx="6" fill="#1a1a2e" stroke="rgba(219,177,85,0.3)" stroke-width="1.5"/>
    <rect x="12" y="55" width="106" height="78" rx="3" fill="#0d0d1a" stroke="rgba(219,177,85,0.2)" stroke-width="1"/>
    <text x="65" y="98" text-anchor="middle" fill="#dbb155" font-family="monospace" font-size="9">PRESS START</text>
    <rect x="25" y="143" width="80" height="35" rx="3" fill="#1e1e35"/>
    <circle cx="50" cy="161" r="8" fill="#dbb155"/>
    <circle cx="80" cy="158" r="6" fill="#dbb155"/>
  </g>
  <g transform="translate(640,85)">
    <rect x="0" y="40" width="130" height="345" rx="6" fill="#1a1a2e" stroke="rgba(219,177,85,0.3)" stroke-width="1.5"/>
    <rect x="12" y="55" width="106" height="72" rx="3" fill="#0d0d1a" stroke="rgba(219,177,85,0.2)" stroke-width="1"/>
    <text x="65" y="95" text-anchor="middle" fill="rgba(0,255,209,0.5)" font-family="monospace" font-size="9">CREDIT: 03</text>
    <rect x="25" y="137" width="80" height="35" rx="3" fill="#1e1e35"/>
    <circle cx="50" cy="155" r="8" fill="#dbb155"/>
    <circle cx="80" cy="152" r="6" fill="rgba(0,255,209,0.6)"/>
  </g>
  <!-- Neon accent lights -->
  <g filter="url(#glow)" opacity="0.6">
    <line x1="40" y1="40" x2="760" y2="40" stroke="#dbb155" stroke-width="2"/>
    <circle cx="100" cy="40" r="3" fill="#dbb155"/>
    <circle cx="400" cy="40" r="3" fill="#dbb155"/>
    <circle cx="700" cy="40" r="3" fill="#dbb155"/>
  </g>
  <!-- Floor reflections -->
  <g opacity="0.15">
    <rect x="75" y="475" width="80" height="30" rx="2" fill="#dbb155"/>
    <rect x="225" y="475" width="80" height="30" rx="2" fill="rgba(0,255,209,0.5)"/>
    <rect x="375" y="475" width="80" height="30" rx="2" fill="#dbb155"/>
    <rect x="525" y="475" width="80" height="30" rx="2" fill="#dbb155"/>
    <rect x="675" y="475" width="80" height="30" rx="2" fill="rgba(0,255,209,0.5)"/>
  </g>
  <!-- Ambient -->
  <ellipse cx="400" cy="300" rx="350" ry="280" fill="rgba(219,177,85,0.02)"/>
</svg>
