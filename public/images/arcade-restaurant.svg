<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbb155"/>
      <stop offset="100%" stop-color="#c49a3c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="rgba(219,177,85,0.06)" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <!-- Restaurant environment -->
  <rect x="0" y="450" width="800" height="150" fill="rgba(219,177,85,0.03)"/>
  <!-- Arcade machine 1 -->
  <g transform="translate(80,100)">
    <rect x="0" y="60" width="160" height="330" rx="8" fill="#1a1a2e" stroke="rgba(219,177,85,0.4)" stroke-width="1.5"/>
    <rect x="15" y="75" width="130" height="90" rx="4" fill="#0a0a0f" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <rect x="20" y="80" width="120" height="80" rx="2" fill="#0d0d1a"/>
    <text x="80" y="125" text-anchor="middle" fill="#dbb155" font-family="monospace" font-size="10">PLAYING</text>
    <rect x="30" y="175" width="100" height="50" rx="4" fill="#1e1e35" stroke="rgba(219,177,85,0.2)" stroke-width="1"/>
    <circle cx="60" cy="200" r="12" fill="#1a1a2e" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <circle cx="60" cy="198" r="4" fill="#dbb155"/>
    <circle cx="100" cy="195" r="8" fill="#1a1a2e" stroke="rgba(0,255,209,0.5)" stroke-width="1"/>
    <circle cx="100" cy="195" r="3" fill="rgba(0,255,209,0.7)"/>
  </g>
  <!-- Arcade machine 2 -->
  <g transform="translate(320,80)">
    <rect x="0" y="60" width="160" height="350" rx="8" fill="#1a1a2e" stroke="rgba(219,177,85,0.4)" stroke-width="1.5"/>
    <rect x="15" y="75" width="130" height="100" rx="4" fill="#0a0a0f" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <rect x="20" y="80" width="120" height="90" rx="2" fill="#0d0d1a"/>
    <text x="80" y="130" text-anchor="middle" fill="rgba(0,255,209,0.7)" font-family="monospace" font-size="10">HIGH SCORE</text>
    <rect x="30" y="185" width="100" height="50" rx="4" fill="#1e1e35" stroke="rgba(219,177,85,0.2)" stroke-width="1"/>
    <circle cx="60" cy="210" r="12" fill="#1a1a2e" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <circle cx="60" cy="208" r="4" fill="#dbb155"/>
    <circle cx="100" cy="205" r="8" fill="#1a1a2e" stroke="#dbb155" stroke-width="1"/>
    <circle cx="100" cy="205" r="3" fill="#dbb155"/>
  </g>
  <!-- Arcade machine 3 -->
  <g transform="translate(560,110)">
    <rect x="0" y="60" width="160" height="320" rx="8" fill="#1a1a2e" stroke="rgba(219,177,85,0.4)" stroke-width="1.5"/>
    <rect x="15" y="75" width="130" height="85" rx="4" fill="#0a0a0f" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <rect x="20" y="80" width="120" height="75" rx="2" fill="#0d0d1a"/>
    <text x="80" y="122" text-anchor="middle" fill="#dbb155" font-family="monospace" font-size="10">READY</text>
    <rect x="30" y="170" width="100" height="50" rx="4" fill="#1e1e35" stroke="rgba(219,177,85,0.2)" stroke-width="1"/>
    <circle cx="60" cy="195" r="12" fill="#1a1a2e" stroke="rgba(219,177,85,0.3)" stroke-width="1"/>
    <circle cx="60" cy="193" r="4" fill="#dbb155"/>
    <circle cx="100" cy="190" r="8" fill="#1a1a2e" stroke="rgba(219,177,85,0.5)" stroke-width="1"/>
    <circle cx="100" cy="190" r="3" fill="rgba(219,177,85,0.6)"/>
  </g>
  <!-- Tables/chairs hint -->
  <ellipse cx="250" cy="510" rx="40" ry="15" fill="rgba(219,177,85,0.05)" stroke="rgba(219,177,85,0.1)" stroke-width="1"/>
  <ellipse cx="550" cy="520" rx="35" ry="12" fill="rgba(219,177,85,0.05)" stroke="rgba(219,177,85,0.1)" stroke-width="1"/>
  <!-- Ambient -->
  <ellipse cx="400" cy="300" rx="350" ry="280" fill="rgba(219,177,85,0.02)"/>
</svg>
